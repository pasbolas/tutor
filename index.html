<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tutor Notes Index</title>
    <meta
      name="description"
      content="A minimal tutor notes index with expandable subjects and note links."
    />
    <meta name="theme-color" content="#a85a4d" />
    <meta name="application-name" content="Tutor Notes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Tutor Notes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/main.css?v=20260423-4" />
    <link rel="stylesheet" href="./styles/feedback.css?v=20260423-4" />
  </head>
  <body>
    <div class="editorial-loader" data-editorial-loader aria-hidden="true">
      <div class="editorial-loader__frame" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="editorial-loader__center">
        <p class="editorial-loader__micro">Tutor / Notes Index</p>
        <div class="editorial-loader__monogram" aria-label="TN mark">
          <span>T</span>
          <span>N</span>
        </div>
        <div class="editorial-loader__seal" aria-hidden="true">
          <img src="./assets/loading/editorial-seal.jpg" alt="" />
        </div>
      </div>
    </div>

    <main
      class="study-shell notes-shell notes-shell--minimal"
      data-notes-hub
      data-notes-catalog="./data/notes-catalog.json?v=20260427-1"
    >
      <header class="study-topbar">
        <span class="study-topbar__id">[TUTOR_HOME]</span>
        <span class="study-topbar__title">Tutor Notes / Subjects</span>
        <nav class="study-topbar__nav" aria-label="Tutor index links">
          <a href="#subjects">Subjects</a>
        </nav>
      </header>

      <section class="notes-minimal startup-reveal startup-reveal--content" id="subjects">
        <div class="notes-minimal__header">
          <p class="study-kicker">Subjects</p>
          <h1>Notes</h1>
        </div>

        <div class="notes-subjects" data-notes-subjects-root></div>
      </section>
    </main>

    <button class="scroll-to-top" data-scroll-to-top aria-label="Scroll to top">
      <span>to top</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"></polyline>
      </svg>
    </button>

    <script src="./scripts/page-transitions.js?v=20260423-4"></script>
    <script src="./scripts/interaction/audio.js?v=20260423-4"></script>
    <script src="./scripts/interaction/trails.js?v=20260423-4"></script>
    <script src="./scripts/main.js?v=20260423-4"></script>
  </body>
</html>
